body:
  text: 隋天竺三藏闍那崛多譯爾時世尊復告善思離車童子作如是言善思童子此菩薩行無虛妄行善思童子此菩薩行是哀愍行善思童子此菩薩行是無患行能斷一切諸過患故慈憐一切諸衆生故善思童子此菩薩行甚深微妙無有相行善思童子此菩薩行真實能離一切欲相善思童子此無欲行無愛憎故善思童子此菩薩行一切衆生平等心行其心畢竟無所得故善思童子此菩薩行大慈悲行於一切法無有得故善思童子此菩薩行大布施行無有施故善思童子此菩薩行不虛誑行不受一切後身報故善思童子此菩薩行無惱忍行現無諍故善思童子此菩薩行發誓願行捨懶惰故善思童子此菩薩行是三昧行以寂靜故善思童子此菩薩行是智慧行於一切法無有得故善思童子此菩薩行是無畏行心無恐故善思童子此菩薩行是無礙行成就如來諸智力故善思童子此菩薩行是增益行入智慧門無有著故善思童子此菩薩行觀十方行無染著故爾時世尊欲為善思重宣此義而說偈言無疑惑行者為諸菩薩說疑惑及諸行此二不可得為諸菩薩說有行無行處若知此行處彼等無諍競攝受一切法為諸菩薩說無所有得處此行最為上我行此行處彼則顛倒行既住顛倒行彼無有畏處此雖名諍行彼諍不可得若能如是知彼行最上乘此乘無有驚佛乘最為上驚及無驚怖一切法假名雖說諸行處一切不可得一切既不得彼行最為上此行甚深行愍於一切法愍及甚深行皆從分別生甚深及諸行是處二俱無若知此際者彼於法無沒諸法無可染非法亦復然此諸法本性當說無染處無牢及無固此但是有現無有名字處此句最為上我雖說有愛彼處無恐怖以無有物故彼處不生競此諸衆生行此處無有真若有知此者彼為善說行此處無衆生故我說衆生衆生法一等此路最為上心及有衆生畢竟不可得此名為最慈我前說大慈世間大施主亦名大衆生常樂行布施故名大施主法尚不可得況復當有邊大智菩薩輩故名為施主佛既不可得法亦不思議此戒不缺犯諸法無倚處彼等不思議佛戒不思議不分別戒行為諸菩薩說忍向衆生輩衆生畢竟無此是最勝忍我法行中說心不可得故諍競無處生此是最上忍諸法不可得菩薩無懈怠不被他毀辱此名最精進名為不捨取身心善質直能辦於此行是名最精進為諸菩薩說菩薩能懶惰不發諸行等能不捨不取彼住最精進心界不可得若外若在內故名寂定心其心無有處攀緣及心行真如中無有不思彼三昧示現如是定我說此三昧自在修伽陀能行此行者我說彼得定不以智能知有諸真如法真如及智慧此二邊無有此法不可得此是識境界法不以識知真體此處寂能知如是者彼等名真念菩薩真如行世所不能行彼勝一切衆為衆生說法彼無衆生相況復有徒衆衆生如幻化幻化亦無有如是能說者彼無有恐怖若我若他身此二俱無有能有此智者彼無有驚懼諸內及與外有相畢竟無心無怯弱處即勝一切世諸法無有礙猶如虛空行既如虛空行法真如亦然若能知此智菩薩無所畏巧解一切法彼知衆生行既知無衆生一切法亦然界智巧解知彼界不可得若入是法門此路最為勝有能從此道即知衆生行境界及衆生此二無有物欲識諸法門須知此勝智若內若有外智慧無集處無礙諸法中故名為實際諸法不思議故名為佛法彼無所有處其處亦復無若能如是行世間無障礙智既無有礙故名為佛智諸法不思議彼輩無真正諸法既無體是覺諸佛法佛及諸佛法此二俱無有菩提無有故是名為佛道乘此大乘者到法安樂處此世最為勝人世不可得凡世間所有一切處衆生彼菩薩為勝行此勝智者能求此諸法佛法不思議能得此諸法彼即近菩提菩提及諸法此二畢竟無能作如是行即近諸佛法能行此行者不染諸世間既無有染心彼去菩提近爾時世尊說此偈已復更重告善思離車童子作是言復次善思我今宣說若有菩薩摩訶薩等善著鎧者能於如是甚深經典能善說者最妙微密善說之時聞已其人能不驚怖不悔不沒如是菩薩摩訶薩等即得住於菩提道場即得入於諸佛境界即證無礙即住無為解脫法門又能巧住無得之行即能觀察一切十方即能證得大慈大悲即得諸佛十八不共法即得無上最大灌頂說此甚深微妙法時能有信行能有思惟如是法者諸佛已觀彼等菩薩一切諸佛已護持彼若菩薩能信此行者或有不信於此行者亦為一切諸佛所知若有能入此法門者諸佛已知若能信行此法門者我當為於彼等作師彼等則為隨我出家爾時世尊欲為善思重宣此義而說偈言彼等證道場道場者即空若不取菩提彼等即住智諸法無有礙畢竟不可得法既不可得解脫亦復然諸佛智行者一切諸法處及於諸法行世尊如是說有礙無礙處愚癡作是心佛及大菩薩不如是分別雖觀世間法世間畢竟空智能觀世間彼智亦無有衆生及諸佛一種無分別既無分別處彼慈最為勝法界廣大性衆生界亦然大智諸菩薩不如是思惟雖復欲起慈彼慈實無體慈體及無性非衆生境界若五指量空先無今亦無諸世間亦然此慈最為勝諸法無上者名為諸佛法彼等無得處此即是真體世尊大慈悲無有形與色如是無色法是行名世間虛空無有邊境界不可執諸佛如是法智者行此順是即無上智而智不可得智既無得處彼處實無有此岸及彼岸若思惟若見彼等無此行甚深是名相若知此等法一切處平等於我法行中不假求知識若作取捨心分別二見處此事言有者彼非善知識有言此法成或言此法滅善思此比丘非是我弟子言證苦滅者畢竟不可得如是說法師彼非說我法諸法無起處何言諸法集無起處說滅彼等遠我法如是寂法中無有分別處諸法既無有滅處亦復無若有諍競心豈名說寂滅善思汝知此彼不名真實說道及與法此是示現有既示現有處彼假現有路我說諸菩薩未來世大智能作如是行彼依此境界能行此行者諸佛說甚深彼已供養我利益諸含識能持此經典諸大智菩薩彼於未來世住持諸法故我所說諸法常住無分別此即是菩提離此無別道爾時世尊說是法已是時善思離車童子於諸法中即便證得無生順忍既得證彼無生忍已遠離一切世間憂喜得大歡樂即更飛騰上虛空中離地高於七多羅樹爾時世尊當於彼時即便微笑而諸世尊有如是法微笑之時從其面門出種種光其光雜色所謂青黃赤白紅縹緑紺頗梨彼之光明如是遍照無量無邊諸佛世界乃至有頂大梵天宮照已還回至於佛所圍繞三匝繞已從於佛頂而入當入之時此之大地具足六種十八相動動遍動等遍動踊遍踊等遍踊沒遍沒等遍沒震遍震等遍震吼遍吼等遍吼覺遍覺等遍覺爾時上界虛空之中天雨種種細栴檀末沈水末香及天華雨天諸種種微妙音聲自然而作此之三千大千世界清淨莊嚴猶如北方鬱單越國莊嚴華麗一種無殊此之三千大千世界亦爾無異爾時長老阿難比丘從座而起整理衣服偏袒右肩右膝著地合掌向佛而白佛言希有世尊未審如來有何因緣微笑放光諸佛世尊非無因緣而放光明作是語已即便以偈而白佛言諸佛世間最勝尊微笑放光必有以利益之處願尊說有此瑞相何因緣虛空天雨華供養世尊故歡喜皆歌嘯稱讚說此經三千世界中種種莊嚴淨猶如鬱單越光普照十方如昔諸世尊其中授記者佛出光照訖回入佛頂中世尊所放光其光種種色從佛面門出為我說此因爾時世尊即以偈告長老阿難作如是言此童子善思宿植善根厚當於未來世成佛兩足尊爾時世尊說此偈已告阿難言阿難此之善思離車童子從今已去供養恭敬億那由他阿僧祇劫諸佛如來承奉不違彼諸佛教又復供養彼諸世尊衣服湯藥房舍臥具四事皆足彼諸如來滅度之後供養舍利以種種寶而用作塔其一一塔各各皆高百千由旬於彼一切諸寶塔中安置舍利以諸名香供養彼塔復將一切華鬘校飾一切諸寶一切諸幡種種妙華及栴檀末沈水末等而以散上復將最妙種種音聲以供養之供養彼諸多陀阿伽度阿羅訶三藐三佛陀已捨最後身而得作佛名為淨月多陀阿伽度阿羅訶三藐三佛陀出現於世善逝世間解無上士調御丈夫天人師佛世尊爾時世尊欲為阿難及諸大衆重宣此義而說偈言若滿十方界諸寶妙珍奇布施佛世尊及諸菩薩衆得聞此法相如大聖所宣校量財施功此福多於彼爾時長老舍利弗聞佛世尊說此校量功德語已即更以偈而白佛言世尊說此經甚深最微妙而不說名字我等云何持此經典所明諸法皆平等無有得不得希有佛善說有漏及有為無漏無為法此經不分別世尊善巧說世間出世間世諦第一義二界無有異此經如是說佛所說諸行方便為衆生真理皆悉無世尊金口說諸佛及諸法彼等一切無能所乘並空希有佛善說十方諸世尊所說諸法相彼等無真體此經如是行善哉大聖尊善哉最勝智此經名云何為我等解說智慧此語已今日決諸疑八功德相圓音聲告於彼欲知此經者名為灌頂王雖言灌頂王灌頂亦無有能持此經者諸佛說彼人於天人世間當為如寶塔我說是經處聽衆有八千多種諸善根發無上道意彼等於來世決作無上尊得聞此妙經難思議福德止住安隱處甚深善根中彼乃如是能受持此經典係念專讀誦此之灌頂王彼等人輩於諸法無疑惑此不說初忍第二忍亦無諸法相既空云何有說處若人受持此灌頂王經典彼作如是等諸法乘辨才若有智女人受持此經典速捨女雜穢罪業不淨身一智一切知一切智一知此是持諸法此經中具說此經所說法入處如虛空我說此入道作諸法光明即知種種名處處有多種雖復說諸法彼法不可得所有無言體其相畢竟無知是諸法門是名受持法言無諸法者彼處有無無此是法體相名為陀羅尼若人欲無邊一切光明照當持此經典善說灌頂王欲求法界邊此中已說訖彼界不可得故名陀羅尼一切法甚深法者無得處既無法得處彼處無常無若成就辨才智深遠無礙乃能知此義是經無所著如阿耨達龍於空中降雨彼無有心想名不可思議若欲廣多宣種種辨才說依此經中學無倚一切法彼法無來處善說如此經諸法無有生如此經所說如日光明照彼光無處來此經如是明法光常充滿來世善男子欲無盡辨才當學灌頂王善說此法本速得無礙辨甚深不思議若學灌頂王世多作利益若不修此法無上灌頂王彼人不受持如是無譬喻彼等四部衆遠我法行中不解此義人無義可能義若有四部衆能行此行時無上諸法中即為世間眼如忉利宮殿顯現高巍巍此經典亦然世間最為最如立須彌頂覩見世間人如是住此經觀見一切法如人暗夜中秉高大火炬彼人所行處終無諸黑暗此經光所照明見一切法能持此經者彼無諸暗黑譬如日光焰一切處悉明此經典亦然能出多種法又如虛空月放光明流轉如是此經典遍照十方界此印諸法印一切印中印故遣住此印為諸菩薩輩如欲印虛空本無亦不住虛空及與印此二是分別如是佛及法此經中所說諸佛不可說諸法亦復然如王捨命時殷勤善囑授敕諸大臣等財付我諸子如是聖法身我昔修習得阿難汝來世付囑諸菩薩我以說此經為諸菩薩輩能持是經者此人福甚多能信受此經依灌頂王說彼人若致疑我當不作佛人欲自在辨於諸法無礙應當學此經我善說灌頂世間說諸法彼是菩提道知已莫應怠此經當讀誦彼等正信人於世間無惑既讀誦此經復能為他說此是諸佛法為諸菩薩說得聞此經已甚深難思議當說此經時十方一切佛微笑放光明各言善說此竪立大勝幢法幢不思議此經四句偈為大衆演說巧行多方便不思議法中能持此經者兼復為他說彼人共佛語證法無上尊能持此經者不思議灌頂爾時世尊說此偈報舍利弗已復更重告長老阿難作如是言阿難若有比丘或比丘尼諸優婆塞及優婆夷於當來世有能信心聽此經典受持讀誦彼人當得最大福德其福德聚不可稱量無有邊際譬如空界無有人能量知邊際如是如是長老阿難此法本中有能受持一四句偈或自讀誦或為他說彼人所得功德善根亦不可量亦不可說無有邊際爾時世尊欲為阿難及諸大衆重宣此義而說偈言若能讀誦此無邊方便身利益多衆生灌頂王憐愍假使我今說虛空可度量欲比校斯經不可得窮盡十方一切佛世中無上尊若受持此經悉皆供養彼十方一切佛斷生死法王能持此經人名已供養彼十方諸世界除斷十惡根聞此經典人能供彼諸聖我未來諸佛及過去如來現在十方中兩足尊無上能作師子吼彼悉供養之能受持此經諸佛所宣說持資財供養此非正智人若能持此經供養中為最一切十方界滿七寶行檀以供諸世尊劣持此經福若學此經典一如灌頂王此敬諸如來真實如中顯我所說諸法諸佛不可得彼聞不驚怖即是供世尊此供養甚深世間無解者不取及不捨此供養最勝諸佛及諸法一切不取捨此供養最勝諸佛世尊歎往昔定光佛我供養此法此供最為勝為諸菩薩說於時彼佛邊我持此供養彼佛授我記汝當得作佛若當欲作佛復為衆生最應成就此路是名供養佛我如是供養今得成佛道洞達一切法堪受天人供所有諸佛法世間無上尊乘此最勝供諸供養中最證於佛境界智慧不思議能作師子吼如我今無畏作師子吼已得諸法自在解脫衆生輩入無漏涅槃爾時世尊說此經已善思童子及毗耶離一切大衆天龍夜叉乾闥婆阿修羅人非人等聞佛所說皆悉信受歡喜奉行
